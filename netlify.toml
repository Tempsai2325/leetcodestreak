[build]
  publish = "dist"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/activity"
  to = "/.netlify/functions/activity"
  status = 200

[[redirects]]
  from = "/api/wallpaper"
  to = "/.netlify/functions/wallpaper"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
